name: Deploy demo to GitHub Pages

# Builds the redacted, read-only preview demo (visitors can import their own CSV;
# it is parsed in-browser and never stored) and publishes it to GitHub Pages.
# Enable Pages for the repo with source "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build demo
        working-directory: frontend
        env:
          # Serve from /<repo>/ on a project Pages site; resolve fixes from the release asset.
          VITE_BASE: "/${{ github.event.repository.name }}/"
          VITE_FIXES_URL: "https://github.com/${{ github.repository }}/releases/latest/download/fixes.csv"
        run: |
          npm ci
          npm run build:demo
          cp dist/index.html dist/404.html   # SPA fallback for deep links
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
