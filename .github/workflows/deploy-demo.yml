name: Deploy demo to Cloudflare Pages

# Builds the redacted, read-only demo (VITE_DEMO=1) and deploys it to Cloudflare
# Pages. Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Set the Pages project name in `projectName` below.

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-demo.yml"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build demo
        working-directory: frontend
        run: |
          npm ci
          npm run build:demo
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=vector-logbook-demo
