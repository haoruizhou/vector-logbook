name: Update fixes dataset

# Heavy lifting done once, centrally: build the merged multi-region fixes.csv
# (FAA NASR + OpenAIP reporting points + open flightmaps designated points) and
# publish it as a release asset that every instance/PWA fetches cheaply.
#
# Release safety: the build script validates the merge (assert_bundle_ok) and
# exits non-zero on a broken/empty result, so the job fails and the previous
# `latest` release stays in place. A new `latest` is only published on success.

on:
  schedule:
    - cron: "17 6 * * 1" # weekly Monday 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-fixes
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build and validate merged fixes.csv
        working-directory: backend
        run: |
          uv sync --frozen
          uv run python scripts/build_fixes.py
          echo "rows=$(($(wc -l < datasets/bundled/fixes.csv) - 1))" >> "$GITHUB_ENV"
          echo "edition=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Publish fixes.csv as the latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fixes-${{ env.edition }}
          name: Fixes ${{ env.edition }}
          body: |
            Merged multi-region enroute-fix bundle (${{ env.rows }} fixes) from
            FAA NASR, OpenAIP (CC BY-NC-SA), and open flightmaps (OFMA license).
            Fetched by VECTOR instances via `LOGBOOK_FIXES_URL`.
          make_latest: true
          files: backend/datasets/bundled/fixes.csv
